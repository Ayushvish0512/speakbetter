<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - SpeakBetter</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        main {
            flex: 1;
            padding: 4rem 2rem;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        .profile-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 3rem;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .input-group {
            margin-bottom: 2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
            font-weight: 600;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 1rem;
            border-radius: 1rem;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--primary);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 1.5rem;
            border-radius: 1.5rem;
            text-align: center;
            border: 1px solid var(--glass-border);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--secondary);
            display: block;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .save-btn {
            width: 100%;
            padding: 1.25rem;
            border-radius: 1rem;
            border: none;
            background: linear-gradient(to right, var(--primary), var(--primary-dark));
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .message {
            margin-top: 1rem;
            text-align: center;
            padding: 1rem;
            border-radius: 1rem;
            display: none;
        }

        .success {
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            display: block;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 2rem;
            color: var(--text-dim);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">SpeakBetter</a>
    </header>

    <main>
        <div class="profile-card">
            <h1>Your Profile</h1>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <span class="stat-value" id="streakVal">0</span>
                    <span class="stat-label">Day Streak</span>
                </div>
                <div class="stat-box">
                    <span class="stat-value" id="joinedVal">...</span>
                    <span class="stat-label">Member Since</span>
                </div>
            </div>

            <div class="input-group">
                <label for="userName">Full Name</label>
                <input type="text" id="userName" placeholder="Your Name">
            </div>

            <div class="input-group">
                <label for="userEmail">Email (View Only)</label>
                <input type="email" id="userEmail" readonly style="opacity: 0.5; cursor: not-allowed;">
            </div>

            <button class="save-btn" id="saveBtn">Save Changes</button>
            <div id="statusMsg" class="message"></div>
        </div>

        <a href="index.html" class="back-link">← Back to Practice</a>
    </main>

    <script>
        const API_BASE = window.location.origin;
        const token = localStorage.getItem('token');

        if (!token) {
            window.location.href = 'index.html';
        }

        async function loadProfile() {
            try {
                const res = await fetch(`${API_BASE}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.ok) {
                    const user = await res.json();
                    document.getElementById('userName').value = user.name;
                    document.getElementById('userEmail').value = user.email;
                    document.getElementById('streakVal').textContent = user.streak;
                    
                    const joined = new Date(user.created_at || Date.now());
                    document.getElementById('joinedVal').textContent = joined.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
                }
            } catch (err) {
                console.error('Failed to load profile', err);
            }
        }

        document.getElementById('saveBtn').onclick = async () => {
            const name = document.getElementById('userName').value;
            const msg = document.getElementById('statusMsg');
            
            try {
                const res = await fetch(`${API_BASE}/auth/me`, {
                    method: 'PUT',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name })
                });

                if (res.ok) {
                    msg.textContent = 'Profile updated successfully!';
                    msg.className = 'message success';
                    setTimeout(() => msg.style.display = 'none', 3000);
                } else {
                    const error = await res.json();
                    msg.textContent = 'Error: ' + (error.detail || 'Could not update profile');
                    msg.style.display = 'block';
                    msg.style.color = '#ef4444';
                    msg.style.background = 'rgba(239, 68, 68, 0.1)';
                }
            } catch (err) {
                msg.textContent = 'Network error. Please try again.';
                msg.style.display = 'block';
            }
        };

        loadProfile();
    </script>
</body>
</html>
