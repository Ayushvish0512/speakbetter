<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - SpeakBetter Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        main {
            flex: 1;
            padding: 3rem 2rem;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
        }

        .btn-add {
            padding: 0.8rem 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-add:hover {
            transform: scale(1.05);
            background: var(--primary-dark);
        }

        .task-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .task-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 2rem;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .task-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .task-date {
            font-size: 0.8rem;
            color: var(--secondary);
            font-weight: 800;
            text-transform: uppercase;
        }

        .task-en {
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
        }

        .task-hi {
            font-size: 1rem;
            color: var(--text-dim);
            font-style: italic;
        }

        .card-actions {
            margin-top: auto;
            display: flex;
            gap: 0.5rem;
        }

        .btn-edit {
            flex: 1;
            padding: 0.6rem;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid var(--glass-border);
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .btn-edit:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Modal Styles */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: var(--bg-dark);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 2rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 1);
            transform: scale(0.9);
            transition: transform 0.3s;
        }

        .modal.active .modal-content {
            transform: scale(1);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
            font-weight: 600;
        }

        input, textarea {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 0.75rem;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        textarea {
            height: 100px;
            resize: none;
        }

        input:focus, textarea:focus {
            border-color: var(--primary);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 1.5rem;
        }

        .back-btn {
            color: var(--text-dim);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .back-btn:hover {
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">SpeakBetter Admin</a>
        <div id="userStatus" style="font-size: 0.9rem; color: var(--text-dim)">
            Logged in as Admin
        </div>
    </header>

    <main>
        <a href="index.html" class="back-btn">← Back to Dashboard</a>
        
        <div class="section-header">
            <h1>Daily Tasks</h1>
            <button class="btn-add" id="openAddModal">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                New Task
            </button>
        </div>

        <div class="task-grid" id="taskGrid">
            <!-- Tasks will be loaded here -->
        </div>
    </main>

    <!-- Task Modal -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <button class="btn-close" id="closeModal">&times;</button>
            <h2 id="modalTitle" style="margin-bottom: 2rem;">Add New Task</h2>
            <form id="taskForm">
                <input type="hidden" id="taskId">
                <div class="form-group">
                    <label>Date (YYYY-MM-DD)</label>
                    <input type="date" id="taskDate" required>
                </div>
                <div class="form-group">
                    <label>Task in English</label>
                    <textarea id="taskEn" placeholder="e.g. Describe your favorite movie..." required></textarea>
                </div>
                <div class="form-group">
                    <label>Task in Hindi</label>
                    <textarea id="taskHi" placeholder="e.g. अपनी पसंदीदा फिल्म के बारे में बताएं..." required></textarea>
                </div>
                <button type="submit" class="btn-submit" id="submitBtn">Save Task</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        const token = localStorage.getItem('token');

        if (!token) {
            window.location.href = 'index.html';
        }

        const taskGrid = document.getElementById('taskGrid');
        const taskModal = document.getElementById('taskModal');
        const taskForm = document.getElementById('taskForm');
        
        // Open Modal
        document.getElementById('openAddModal').onclick = () => {
            document.getElementById('modalTitle').innerText = 'Add New Task';
            document.getElementById('taskId').value = '';
            taskForm.reset();
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('taskDate').value = today;
            taskModal.classList.add('active');
        };

        // Close Modal
        document.getElementById('closeModal').onclick = () => {
            taskModal.classList.remove('active');
        };

        // Load Tasks (Take Data)
        async function loadTasks() {
            try {
                const res = await fetch(`${API_BASE}/task/all`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const tasks = await res.json();
                
                taskGrid.innerHTML = '';
                tasks.sort((a, b) => b.date.localeCompare(a.date)).forEach(task => {
                    const card = document.createElement('div');
                    card.className = 'task-card';
                    card.innerHTML = `
                        <div class="task-date">${task.date}</div>
                        <div class="task-en">${task.task_en}</div>
                        <div class="task-hi">${task.task_hi}</div>
                        <div class="card-actions">
                            <button class="btn-edit" onclick="editTask('${task._id}', '${task.date}', \`${task.task_en.replace(/'/g, "\\'")}\`, \`${task.task_hi.replace(/'/g, "\\'")}\`)">Edit</button>
                        </div>
                    `;
                    taskGrid.appendChild(card);
                });
            } catch (err) {
                console.error('Failed to load tasks', err);
            }
        }

        // Edit Task (Prep for Update)
        window.editTask = (id, date, en, hi) => {
            document.getElementById('modalTitle').innerText = 'Edit Task';
            document.getElementById('taskId').value = id;
            document.getElementById('taskDate').value = date;
            document.getElementById('taskEn').value = en;
            document.getElementById('taskHi').value = hi;
            taskModal.classList.add('active');
        };

        // Handle Submit (Send / Update Data)
        taskForm.onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('taskId').value;
            const data = {
                date: document.getElementById('taskDate').value,
                task_en: document.getElementById('taskEn').value,
                task_hi: document.getElementById('taskHi').value
            };

            try {
                const method = id ? 'PUT' : 'POST';
                const url = id ? `${API_BASE}/task/${id}` : `${API_BASE}/task/`;
                
                const res = await fetch(url, {
                    method: method,
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    taskModal.classList.remove('active');
                    loadTasks();
                } else {
                    alert('Failed to save task');
                }
            } catch (err) {
                alert('Connection error');
            }
        };

        loadTasks();
    </script>
</body>
</html>
